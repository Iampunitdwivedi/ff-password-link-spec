<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireflies — Password-Protected Link · Full Design Spec</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --font: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --text-1: #1B1B1B;
    --text-2: #5F5F5F;
    --text-3: #8E8E8E;
    --text-4: #B0B0B0;
    --border: #E8E7E4;
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --muted: #F0EFEC;
    --purple: #7C3AED;
    --purple-bg: #F3EEFF;
    --purple-text: #5B21B6;
    --green: #16A34A;
    --green-bg: #F0FDF4;
    --blue: #2563EB;
    --blue-bg: #EFF6FF;
    --amber: #D97706;
    --amber-bg: #FFFBEB;
    --red: #DC2626;
    --red-bg: #FEF2F2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-1);
    height: 100vh;
    overflow: hidden;
    display: flex;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 20px 0;
    flex-shrink: 0;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .sidebar-logo-icon {
    width: 24px; height: 24px; background: var(--purple); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .sidebar-logo-icon svg { width: 13px; height: 13px; color: #fff; }

  .sidebar-logo-text {
    font-size: 14px; font-weight: 600; color: var(--text-1); letter-spacing: -0.2px;
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-top: 16px;
    margin-bottom: 6px;
    padding: 0 2px;
  }

  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 20px;
  }

  .nav-group-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-4);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 16px 8px 6px;
  }

  .nav-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    border: 1px solid transparent;
    margin-bottom: 2px;
  }

  .nav-item:hover { background: var(--muted); }

  .nav-item.active {
    background: var(--purple-bg);
    border-color: rgba(124,58,237,0.12);
  }

  .nav-num {
    width: 22px; height: 22px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 1px;
    background: var(--muted); color: var(--text-3);
    transition: all 0.15s;
  }

  .nav-item.active .nav-num {
    background: var(--purple);
    color: #fff;
  }

  .nav-text-title {
    font-size: 13px; font-weight: 500; color: var(--text-1);
    line-height: 1.35; letter-spacing: -0.1px;
    transition: color 0.12s;
  }

  .nav-item.active .nav-text-title { color: var(--purple-text); }

  .nav-text-desc {
    font-size: 11px; color: var(--text-3); margin-top: 2px; line-height: 1.4;
  }

  /* Flow arrow between items */
  .nav-arrow {
    display: flex;
    justify-content: center;
    padding: 2px 0;
    color: var(--border);
  }
  .nav-arrow svg { width: 14px; height: 14px; }

  /* ── Main area ── */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top bar */
  .top-bar {
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    flex-shrink: 0;
  }

  .top-bar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .screen-badge {
    font-size: 11px; font-weight: 600; color: var(--purple);
    background: var(--purple-bg); padding: 4px 10px; border-radius: 100px;
    letter-spacing: 0.3px;
  }

  .screen-name {
    font-size: 14px; font-weight: 500; color: var(--text-1); letter-spacing: -0.2px;
  }

  .top-bar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-btn {
    width: 34px; height: 34px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--text-3);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .nav-btn:hover { background: var(--muted); color: var(--text-2); border-color: #D0CFCC; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn:disabled:hover { background: var(--surface); color: var(--text-3); }
  .nav-btn svg { width: 16px; height: 16px; }

  .counter {
    font-size: 12px; color: var(--text-3); min-width: 50px; text-align: center;
    font-variant-numeric: tabular-nums;
  }

  /* Iframe container */
  .preview-container {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .preview-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: var(--bg);
  }

  /* Keyboard hint */
  .kbd-hint {
    position: fixed;
    bottom: 16px;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-4);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
    z-index: 50;
  }
  kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 20px; padding: 0 5px;
    background: var(--muted); border: 1px solid var(--border);
    border-radius: 4px; font-size: 11px; font-family: var(--font);
    font-weight: 500; color: var(--text-2);
  }

  @media (max-width: 900px) {
    .sidebar { width: 260px; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <span class="sidebar-logo-text">Fireflies.ai</span>
    </div>
    <div class="sidebar-title">Password-protected link · Design spec</div>
  </div>
  <div class="sidebar-nav" id="sidebar-nav"></div>
</div>

<div class="main-area">
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="screen-badge" id="screen-badge">Screen 1</span>
      <span class="screen-name" id="screen-name">Empty state</span>
    </div>
    <div class="top-bar-right">
      <button class="nav-btn" id="btn-prev" title="Previous screen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="counter" id="counter">1 / 9</span>
      <button class="nav-btn" id="btn-next" title="Next screen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
  </div>
  <div class="preview-container">
    <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
</div>

<div class="kbd-hint">
  <kbd>&larr;</kbd> <kbd>&rarr;</kbd> to navigate
</div>

<script>
const screens = [
  { num: 1, title: "Empty state", desc: "First visit to Password tab", group: "host", file: "01-password-tab-empty.html" },
  { num: 2, title: "Create password", desc: "Password form with validation", group: "host", file: "02-password-tab-create.html" },
  { num: 3, title: "Active state", desc: "Password set, link is live", group: "host", file: "03-password-tab-active.html" },
  { num: 4, title: "Delete confirmation", desc: "Revoke dialog overlay", group: "host", file: "04-delete-confirmation.html" },
  { num: 5, title: "Toast notifications", desc: "Success, copied, revoked", group: "host", file: "05-success-states.html" },
  { num: 6, title: "Password entry", desc: "External user lands here", group: "recipient", file: "06-recipient-password-page.html" },
  { num: 7, title: "Wrong password", desc: "Error state with shake", group: "recipient", file: "07-recipient-wrong-password.html" },
  { num: 8, title: "Meeting view", desc: "Read-only transcript view", group: "recipient", file: "08-recipient-meeting-view.html" },
  { num: 9, title: "Revoked link", desc: "Link no longer active", group: "recipient", file: "09-recipient-revoked-link.html" },
];

const sidebarNav = document.getElementById('sidebar-nav');
const preview = document.getElementById('preview');
const screenBadge = document.getElementById('screen-badge');
const screenName = document.getElementById('screen-name');
const counter = document.getElementById('counter');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');

let current = 0;
const arrow = `<div class="nav-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M12 19l-3-3M12 19l3-3"/></svg></div>`;

function buildNav() {
  let html = '';
  let lastGroup = '';
  screens.forEach((s, i) => {
    if (s.group !== lastGroup) {
      const label = s.group === 'host' ? 'Host side (Fireflies dashboard)' : 'Recipient side (public-facing)';
      html += `<div class="nav-group-label">${label}</div>`;
      lastGroup = s.group;
    }
    if (i > 0 && s.group === screens[i-1].group) {
      html += arrow;
    }
    html += `
      <div class="nav-item${i === current ? ' active' : ''}" data-index="${i}">
        <div class="nav-num">${s.num}</div>
        <div>
          <div class="nav-text-title">${s.title}</div>
          <div class="nav-text-desc">${s.desc}</div>
        </div>
      </div>`;
  });
  sidebarNav.innerHTML = html;

  sidebarNav.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      current = parseInt(item.dataset.index);
      update();
    });
  });
}

function update() {
  const s = screens[current];
  screenBadge.textContent = `Screen ${s.num}`;
  screenName.textContent = s.title;
  counter.textContent = `${s.num} / ${screens.length}`;
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === screens.length - 1;

  preview.src = s.file;

  buildNav();

  const activeItem = sidebarNav.querySelector('.nav-item.active');
  if (activeItem) {
    activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

btnPrev.addEventListener('click', () => { if (current > 0) { current--; update(); } });
btnNext.addEventListener('click', () => { if (current < screens.length - 1) { current++; update(); } });

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' && current > 0) { current--; update(); }
  if (e.key === 'ArrowRight' && current < screens.length - 1) { current++; update(); }
});

// Listen for navigation messages from iframes
window.addEventListener('message', function(e) {
  if (e.data && typeof e.data.goToScreen === 'number') {
    var target = e.data.goToScreen;
    if (target >= 0 && target < screens.length) {
      current = target;
      update();
    }
  }
});

buildNav();
update();
</script>

</body>
</html>
