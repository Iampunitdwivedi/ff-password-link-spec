<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen 2 — Password Tab: Create Password</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --font: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --text-1: #1B1B1B;
    --text-2: #5F5F5F;
    --text-3: #8E8E8E;
    --border: #E8E7E4;
    --border-focus: #7C3AED;
    --bg-page: #F2F1EE;
    --bg-surface: #FFFFFF;
    --bg-muted: #F7F6F3;
    --purple: #7C3AED;
    --purple-hover: #6D28D9;
    --purple-bg: #F3EEFF;
    --purple-disabled: #C4B0F0;
    --green: #16A34A;
    --green-bg: #F0FDF4;
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg-page);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  .backdrop {
    pointer-events: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.18);
  }

  /* Modal */
  .modal {
    pointer-events: auto;
    position: relative;
    z-index: 10;
    background: var(--bg-surface);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 480px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.04),
      0 4px 16px rgba(0,0,0,0.08),
      0 16px 48px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  /* Header */
  .modal-header {
    padding: 22px 24px 0;
    position: relative;
  }
  .modal-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-1);
    line-height: 1.3;
    padding-right: 32px;
    letter-spacing: -0.2px;
  }
  .modal-subtitle {
    font-size: 13px;
    color: var(--text-3);
    margin-top: 3px;
    font-weight: 400;
  }
  .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 28px;
    height: 28px;
    border: none;
    background: none;
    color: var(--text-3);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .close-btn:hover {
    background: var(--bg-muted);
    color: var(--text-2);
  }
  .close-btn svg { width: 18px; height: 18px; }

  /* Tabs */
  .tabs {
    display: flex;
    margin-top: 16px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 0;
    margin-right: 24px;
    font-size: 14px;
    color: var(--text-3);
    cursor: pointer;
    position: relative;
    font-weight: 400;
    transition: color 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover { color: var(--text-2); }
  .tab.active { color: var(--text-1); font-weight: 500; }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--text-1);
    border-radius: 1px 1px 0 0;
  }
  .tab-badge {
    font-size: 10px;
    font-weight: 600;
    background: var(--purple);
    color: #fff;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.4px;
    line-height: 1;
  }

  /* Body */
  .modal-body {
    padding: 24px 24px 28px;
  }

  /* Back / context row */
  .context-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  .context-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--purple-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .context-icon svg {
    width: 20px;
    height: 20px;
    color: var(--purple);
  }
  .context-text-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-1);
    letter-spacing: -0.1px;
  }
  .context-text-desc {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 1px;
  }

  /* Form */
  .field-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-1);
    margin-bottom: 6px;
    display: block;
  }

  .input-wrapper {
    position: relative;
    margin-bottom: 12px;
  }
  .input-wrapper input {
    width: 100%;
    height: 42px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0 42px 0 14px;
    font-size: 14px;
    font-family: var(--font);
    color: var(--text-1);
    background: var(--bg-surface);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    letter-spacing: 0.3px;
  }
  .input-wrapper input::placeholder {
    color: var(--text-3);
    letter-spacing: 0;
  }
  .input-wrapper input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
  }
  .toggle-visibility {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;
    border: none;
    background: none;
    color: var(--text-3);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .toggle-visibility:hover {
    color: var(--text-2);
    background: var(--bg-muted);
  }
  .toggle-visibility svg {
    width: 18px;
    height: 18px;
  }

  /* Requirements */
  .requirements {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
    padding: 14px 16px;
    background: var(--bg-muted);
    border-radius: var(--radius);
  }
  .req-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-3);
    transition: color 0.2s;
  }
  .req-item.met {
    color: var(--green);
  }
  .req-icon {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .req-item:not(.met) .req-icon {
    border: 1.5px solid var(--border);
    background: var(--bg-surface);
  }
  .req-item.met .req-icon {
    border: none;
    background: var(--green);
  }
  .req-icon svg {
    width: 10px;
    height: 10px;
  }
  .req-item:not(.met) .req-icon svg {
    display: none;
  }

  /* Buttons */
  .btn-primary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    height: 42px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, opacity 0.15s;
    letter-spacing: -0.1px;
  }
  .btn-primary:hover { background: var(--purple-hover); }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary.disabled {
    background: var(--purple-disabled);
    cursor: not-allowed;
  }
  .btn-primary.disabled:hover { background: var(--purple-disabled); }
  .btn-primary.disabled:active { transform: none; }
  .btn-primary svg { width: 16px; height: 16px; }

  .btn-cancel {
    display: block;
    margin: 12px auto 0;
    background: none;
    border: none;
    font-size: 13px;
    color: var(--text-3);
    cursor: pointer;
    font-family: var(--font);
    padding: 4px 12px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  .btn-cancel:hover {
    color: var(--text-2);
    background: var(--bg-muted);
  }

  /* Screen label */
  .screen-label {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text-1);
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 100px;
    font-family: var(--font);
    letter-spacing: 0.2px;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="backdrop"></div>

<div class="modal">
  <div class="modal-header">
    <div class="modal-title">Fireflies Diarization Technology Overview</div>
    <div class="modal-subtitle">Punit Dwivedi · Sun, Mar 22, 10:15 PM</div>
    <button class="close-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="tabs">
      <div class="tab" style="cursor:pointer;" onclick="window.parent.postMessage({showTooltip:'Share tab (existing)'}, '*')"  >Share</div>
      <div class="tab" style="cursor:pointer;" onclick="window.parent.postMessage({showTooltip:'Embed tab (existing)'}, '*')" >Embed</div>
      <div class="tab active">Password <span class="tab-badge">NEW</span></div>
    </div>
  </div>

  <div class="modal-body">

    <div class="context-row">
      <div class="context-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L4 6v5c0 5.25 3.4 10.15 8 11.25 4.6-1.1 8-6 8-11.25V6L12 2z"/>
        </svg>
      </div>
      <div>
        <div class="context-text-title">Set a password</div>
        <div class="context-text-desc">This will generate a separate password-protected link</div>
      </div>
    </div>

    <label class="field-label">Password</label>
    <div class="input-wrapper">
      <input type="password" id="pw-input" placeholder="Enter a password" autocomplete="off" />
      <button class="toggle-visibility" id="toggle-btn" title="Show password">
        <svg id="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <svg id="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M14.12 14.12a3 3 0 01-4.24-4.24"/>
        </svg>
      </button>
    </div>

    <div class="requirements">
      <div class="req-item" id="req-length">
        <span class="req-icon"><svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6l2.5 2.5 4.5-5"/></svg></span>
        At least 8 characters
      </div>
      <div class="req-item" id="req-letter">
        <span class="req-icon"><svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6l2.5 2.5 4.5-5"/></svg></span>
        Contains a letter
      </div>
      <div class="req-item" id="req-number">
        <span class="req-icon"><svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6l2.5 2.5 4.5-5"/></svg></span>
        Contains a number
      </div>
    </div>

    <button class="btn-primary disabled" id="submit-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      Create password & generate link
    </button>

    <button class="btn-cancel">Cancel</button>

  </div>
</div>

<div class="screen-label">Screen 2 · Password tab — Create password</div>

<script>
  const input = document.getElementById('pw-input');
  const toggleBtn = document.getElementById('toggle-btn');
  const eyeOpen = document.getElementById('eye-open');
  const eyeClosed = document.getElementById('eye-closed');
  const submitBtn = document.getElementById('submit-btn');
  const reqLength = document.getElementById('req-length');
  const reqLetter = document.getElementById('req-letter');
  const reqNumber = document.getElementById('req-number');

  let visible = false;

  toggleBtn.addEventListener('click', function() {
    visible = !visible;
    input.type = visible ? 'text' : 'password';
    eyeOpen.style.display = visible ? 'none' : 'block';
    eyeClosed.style.display = visible ? 'block' : 'none';
    toggleBtn.title = visible ? 'Hide password' : 'Show password';
  });

  input.addEventListener('input', function() {
    const val = input.value;
    const hasLength = val.length >= 8;
    const hasLetter = /[a-zA-Z]/.test(val);
    const hasNumber = /[0-9]/.test(val);

    reqLength.classList.toggle('met', hasLength);
    reqLetter.classList.toggle('met', hasLetter);
    reqNumber.classList.toggle('met', hasNumber);

    const allMet = hasLength && hasLetter && hasNumber;
    submitBtn.classList.toggle('disabled', !allMet);
  });
</script>

<script>
document.getElementById('submit-btn').addEventListener('click', function() {
  if (!this.classList.contains('disabled')) {
    window.parent.postMessage({goToScreen: 2}, "*");
  }
});
document.querySelector('.btn-cancel').addEventListener('click', function() {
  window.parent.postMessage({goToScreen: 0}, "*");
});
</script>
</body>
</html>
